<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NSC | Home</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Fundo estático com imagem fixa (adicione sua imagem) */
      body {
        background-image: url("fundo-site.jpg"); /* ← troque pelo nome da sua imagem */
        background-attachment: fixed;
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      /* O bg-glow vai sobrepor suavemente a imagem */
      .bg-glow {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle at 30% 20%,
          rgba(212, 175, 55, 0.15),
          rgba(0, 0, 0, 0.8) 90%
        );
        pointer-events: none;
        z-index: 0;
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>
    <header>...</header>
    <main
      style="
        max-width: 900px;
        margin: 2rem auto;
        padding: 2rem;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 28px;
      "
    >
      <h1>Termos de Uso</h1>
      <p>Última atualização: 01/05/2025</p>
      <h2>1. Aceitação dos termos</h2>
      <p>Ao acessar este site, você concorda com estes termos...</p>
      <h2>2. Produtos e preços</h2>
      <p>Os preços podem ser alterados sem aviso prévio...</p>
      <h2>3. Política de entrega</h2>
      <p>Consulte nossa política de frete no checkout...</p>
    </main>
    <footer class="footer">...</footer>
    <script src="script.js"></script>
  </body>
</html>
